services:
  # Backend FastAPI Service
  - type: web
    name: edtech-backend
    env: docker
    plan: free
    region: ohio
    healthCheckPath: /
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: edtech-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: FRONTEND_URL
        value: https://edu-ten-mu.vercel.app
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        value: https://edtech-backend.onrender.com/api/auth/callback

# Managed PostgreSQL Database
databases:
  - name: edtech-db
    databaseName: edtechbackend
    user: edtechbackend_user
    plan: free
    region: ohio
